### Benchmark
benchmark: 
    benchmark: "perqa"
    # NOTE: local artifacts are stored under .../data/data/ (extra `data` folder)
    benchmark_dir: "./data/data/benchmarks/perqa"
    result_dir: "./data/data/results/perqa/reqap_sft"

### QU
qu:
    qu_execution_cache_size: 100  #EFFICIENCY / MEMORY trade-off
    qu_mode_options: ["openai", "instruct_model", "seq2seq"] 
    qu_mode: "seq2seq"
    # qu - supervisor
    qu_supervisor_instr: "./prompts/instruction-qu_supervisor.txt"
    qu_supervisor_icl: "./prompts/icl-qu_supervisor.json"
    qu_icl_selection_strategy: "dynamic"
    qu_icl_num_examples: 8
    # qu - model
    causal: True
    qu_causal_instr: prompts/instruction-qu_causal.txt
    # NOTE: local model artifacts are stored under .../data/data/ (extra `data` folder)
    tokenizer_path: "C:/Users/23369/Desktop/final_work/ReQAP-main/ReQAP-main/data/data/tokenizers/qu-tokenizer-llama-3.2-1B-Instruct"
    trained_model_path: "C:/Users/23369/Desktop/final_work/ReQAP-main/ReQAP-main/data/data/models/perqa/qu-trained_model-llama-3.2-1B-Instruct"
    max_input_length: 800
    max_output_length: 512
    max_length: 1024
    qu_use_history: True
    qu_inference_batch_size: 20
    # qu - model - training
    qu_training:
        qu_correct_only: False
        qu_result_data:
            train: "./data/training_data/perqa/qu/train_data_results_openai.jsonl"
            dev: "./data/training_data/perqa/qu/dev_data_results_openai.jsonl"
        qu_data:
            train: "./data/training_data/perqa/qu/train_data.jsonl"
            dev: "./data/training_data/perqa/qu/dev_data.jsonl"
        qu_result_paths:
            train: "./data/data/results/perqa/reqap_openai/qu_train.jsonl"
            dev: "./data/data/results/perqa/reqap_openai/qu_dev.jsonl"
            test: "./data/data/results/perqa/reqap_openai/qu_test.jsonl"
    qu_result_paths:
        train: "./data/data/results/perqa/reqap_sft/qu_train.jsonl"
        dev: "./data/data/results/perqa/reqap_sft/qu_dev.jsonl"
        test: "./data/data/results/perqa/reqap_sft/qu_test.jsonl"
    # qu - model - generation
    sampling_params:
        n: 1  # number of branches in tree
        do_sample: False
        temperature: 0.0
        max_new_tokens: 200


### RETRIEVE
# splade
splade:
    splade_indices_dir: "./data/splade_indices/perqa"
    splade_model_type_or_path: "./data/models/splade-cocondenser-ensembledistil"
    splade_tokenizer_type: "./data/models/splade-cocondenser-ensembledistil"
    splade_max_length: 512
    splade_index_batch_size: 8
    splade_threshold: 0.1  # threshold for events derived by SPLADE in step 1 of RETRIEVE
    splade_verbalize_events: True  # enables linearization of events for retrieval (slight improvements)

### DENSE RETRIEVER
dense:
    dense_indices_dir: "./data/dense_indices/perqa"
    dense_model_type_or_path: "sentence-transformers/all-MiniLM-L6-v2"
    use_sentence_transformers: true
    dense_threshold: 0.0  # minimum similarity threshold
    dense_index_batch_size: 32

### HYBRID RETRIEVAL
hybrid:
    enabled: false  # set to true to enable hybrid retrieval (SPLADE + Dense)
    fusion_strategy: "rrf"  # options: "rrf", "weighted_sum", "max", "reciprocal_rank"
    fusion_params:
        rrf_k: 60  # RRF constant (only for rrf strategy)
        alpha: 0.5  # sparse retrieval weight (only for weighted_sum strategy)
    top_k_sparse: 1000  # Top-K for SPLADE retrieval
    top_k_dense: 1000   # Top-K for Dense retrieval
    final_top_k: 0      # Final Top-K after fusion (0 = return all)

crossencoder:
    # crossencoder - models
    model_patterns: 
        crossencoder_tokenizer_path: "./data/data/tokenizers/crossencoder-tokenizer-ms-marco-MiniLM-L-12-v2"
        crossencoder_trained_model_path: "./data/data/models/perqa/crossencoder-trained_model_patterns-ms-marco-MiniLM-L-12-v2"
        max_length: 50
        inference_batch_size: 128
    model_events: 
        crossencoder_tokenizer_path: "./data/data/tokenizers/crossencoder-tokenizer-ms-marco-MiniLM-L-12-v2"
        crossencoder_trained_model_path: "./data/data/models/perqa/crossencoder-trained_model_events-ms-marco-MiniLM-L-12-v2"
        max_length: 512
        inference_batch_size: 128  
    # retrieval pattern
    unified_negative_patterns: False  # whether candidate positive patterns can be used for pruning all (often noisy)
    retrieval_pattern:
        apply: True  # whether to utilize patterns to score events as sets
        min_events_matched_inference: 100  # absolute frequency threshold for patterns during inference

### EXTRACT
extract:
    # extract - model
    tokenizer_path: "./data/data/tokenizers/extract-tokenizer-bart-base"
    trained_model_path: "./data/data/models/perqa/extract-trained_model-bart-base"
    max_input_length: 512
    max_output_length: 512
    inference_batch_size: 128
    extract_sample_size_simple_lookup: 50  # number of EXTRACT samples to identify a simple mapping (e.g., date -> start_date)
    simple_lookup_threshold: 0.7 # threshold for exact matches for deriving simple mapping
    extract_add_persona: True  # adds salient information for persona (e.g., list of friends)
    merge_overlapping_events: True  # enables event de-duplication
    # extract - model - generation
    generation_params:
        num_beams: 1
        no_repeat_ngram_size: 3
        forced_bos_token_id: 0
